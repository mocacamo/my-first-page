<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新手短影音終極懶人包｜教學簡報</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9e0ea;
      --accent: #0f9d8a;
      --accent-dark: #0b7467;
      --shadow: 0 20px 60px rgba(16, 24, 40, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button,
    a {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(16px, 3vw, 28px);
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      overflow: hidden;
      color: #101828;
      font-size: 18px;
      font-weight: 750;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-button,
    .download {
      min-width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .icon-button:hover,
    .download:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 157, 138, 0.42);
      box-shadow: 0 10px 24px rgba(15, 157, 138, 0.14);
    }

    .download {
      gap: 8px;
      padding: 0 14px;
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      font-weight: 700;
    }

    .download:hover {
      border-color: var(--accent-dark);
      background: var(--accent-dark);
    }

    .viewer {
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr);
      gap: 18px;
      padding: 18px clamp(14px, 3vw, 28px) 24px;
    }

    .thumbs {
      height: calc(100vh - 96px);
      position: sticky;
      top: 76px;
      overflow: auto;
      padding: 2px 2px 10px;
      scrollbar-width: thin;
    }

    .thumb {
      width: 100%;
      margin: 0 0 10px;
      padding: 0;
      border: 2px solid transparent;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
    }

    .thumb img {
      width: 100%;
      display: block;
      border-radius: 6px;
      background: #ffffff;
      box-shadow: 0 4px 14px rgba(16, 24, 40, 0.12);
    }

    .thumb.is-active {
      border-color: var(--accent);
    }

    .stage-wrap {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .stage {
      width: min(100%, calc((100vh - 150px) * 16 / 9));
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .stage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .controls {
      width: min(100%, calc((100vh - 150px) * 16 / 9));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      align-items: center;
      gap: 12px;
    }

    .progress {
      min-width: 0;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .bar {
      height: 8px;
      border-radius: 99px;
      background: #e7edf5;
      overflow: hidden;
    }

    .bar span {
      width: 0;
      height: 100%;
      display: block;
      border-radius: inherit;
      background: var(--accent);
      transition: width 0.22s ease;
    }

    svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
      }

      .title h1 {
        white-space: normal;
      }

      .download span {
        display: none;
      }

      .viewer {
        grid-template-columns: 1fr;
      }

      .thumbs {
        height: auto;
        position: static;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 6px;
      }

      .thumb {
        width: 104px;
        flex: 0 0 104px;
        margin: 0;
      }

      .stage,
      .controls {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title">
        <h1>新手短影音終極懶人包｜教學簡報</h1>
        <p id="slideLabel">第 1 / 16 頁</p>
      </div>
      <div class="actions">
        <button class="icon-button" id="prevTop" type="button" aria-label="上一頁">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="icon-button" id="nextTop" type="button" aria-label="下一頁">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <a class="download" href="新手短影音終極懶人包_教學簡報.pptx" download aria-label="下載 PPTX">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          <span>下載</span>
        </a>
      </div>
    </header>

    <section class="viewer" aria-label="簡報瀏覽器">
      <nav class="thumbs" id="thumbs" aria-label="投影片縮圖"></nav>
      <div class="stage-wrap">
        <div class="stage">
          <img id="currentSlide" src="新手短影音終極懶人包_教學簡報/slide-1.png" alt="第 1 頁投影片">
        </div>
        <div class="controls">
          <button class="icon-button" id="prev" type="button" aria-label="上一頁">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="progress" aria-live="polite">
            <div class="bar" aria-hidden="true"><span id="bar"></span></div>
            <span id="counter">1 / 16</span>
          </div>
          <button class="icon-button" id="next" type="button" aria-label="下一頁">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const totalSlides = 16;
    const slides = Array.from(
      { length: totalSlides },
      (_, index) => `新手短影音終極懶人包_教學簡報/slide-${index + 1}.png`
    );

    let currentIndex = 0;

    const currentSlide = document.getElementById("currentSlide");
    const slideLabel = document.getElementById("slideLabel");
    const counter = document.getElementById("counter");
    const progressBar = document.getElementById("bar");
    const thumbs = document.getElementById("thumbs");
    const buttons = {
      prev: [document.getElementById("prev"), document.getElementById("prevTop")],
      next: [document.getElementById("next"), document.getElementById("nextTop")]
    };

    function renderThumbs() {
      thumbs.innerHTML = "";
      slides.forEach((src, index) => {
        const button = document.createElement("button");
        button.className = "thumb";
        button.type = "button";
        button.setAttribute("aria-label", `前往第 ${index + 1} 頁`);
        button.addEventListener("click", () => goTo(index));

        const image = document.createElement("img");
        image.src = src;
        image.alt = "";
        image.loading = index < 4 ? "eager" : "lazy";

        button.appendChild(image);
        thumbs.appendChild(button);
      });
    }

    function update() {
      const page = currentIndex + 1;
      currentSlide.src = slides[currentIndex];
      currentSlide.alt = `第 ${page} 頁投影片`;
      slideLabel.textContent = `第 ${page} / ${totalSlides} 頁`;
      counter.textContent = `${page} / ${totalSlides}`;
      progressBar.style.width = `${(page / totalSlides) * 100}%`;

      thumbs.querySelectorAll(".thumb").forEach((thumb, index) => {
        thumb.classList.toggle("is-active", index === currentIndex);
        thumb.setAttribute("aria-current", index === currentIndex ? "true" : "false");
      });
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(totalSlides - 1, index));
      update();
    }

    function go(delta) {
      goTo(currentIndex + delta);
    }

    buttons.prev.forEach((button) => button.addEventListener("click", () => go(-1)));
    buttons.next.forEach((button) => button.addEventListener("click", () => go(1)));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") go(-1);
      if (event.key === "ArrowRight") go(1);
      if (event.key === "Home") goTo(0);
      if (event.key === "End") goTo(totalSlides - 1);
    });

    renderThumbs();
    update();
  </script>
</body>
</html>
